name: 构建并部署产品手册

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 生成更新日志
        run: |
          # 从 GitHub API 获取最新 release-manifest
          curl -s "https://api.github.com/repos/cove-apps/cove-wps/contents/release-manifest.json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -o /tmp/rm.json 2>/dev/null || echo "无法获取远程更新日志"
          node scripts/generate-changelog.js 2>&1 || echo "跳过更新日志生成"

      - name: 构建网站
        run: npm run build

      - name: 安装 Chrome（用于 PDF 导出）
        run: npx puppeteer browsers install chrome || true

      - name: 导出 PDF
        run: node scripts/export-pdf.cjs || echo "PDF 导出跳过"

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
