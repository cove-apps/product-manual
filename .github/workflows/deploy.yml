name: 构建并部署产品手册

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-docs-build]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 生成更新日志
        run: |
          # 从 GitHub API 获取最新 release-manifest
          curl -s "https://api.github.com/repos/cove-apps/cove-wps/contents/release-manifest.json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -o /tmp/rm.json 2>/dev/null || echo "无法获取远程更新日志"
          node scripts/generate-changelog.js 2>&1 || echo "跳过更新日志生成"

      - name: 构建网站
        run: npm run build

      - name: 安装 Chrome（用于 PDF 导出）
        run: npx puppeteer browsers install chrome || true

      - name: 导出 PDF
        run: node scripts/export-pdf.cjs || echo "PDF 导出跳过"

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 发送飞书通知
        if: always()
        env:
          WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
          EVENT: ${{ github.event_name }}
          VERSION: ${{ github.event.client_payload.version }}
          REPO: ${{ github.event.client_payload.repo }}
          STATUS: ${{ job.status }}
          URL: ${{ steps.deployment.outputs.page_url }}
          COMMIT_MSG: ${{ github.event.head_commit && github.event.head_commit.message || '' }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "未配置飞书 Webhook，跳过通知"
            exit 0
          fi

          if [ "$STATUS" = "success" ]; then
            TEMPLATE="green"
            STATUS_TEXT="部署成功 ✅"
          else
            TEMPLATE="red"
            STATUS_TEXT="部署失败 ❌"
          fi

          if [ "$EVENT" = "repository_dispatch" ]; then
            SOURCE="${REPO} 发布 ${VERSION}"
            DETAIL=""
          elif [ "$EVENT" = "push" ]; then
            SOURCE="内容更新推送"
            DETAIL="最新提交：$(echo "$COMMIT_MSG" | head -1)"
          else
            SOURCE="手动触发"
            DETAIL=""
          fi

          if [ -n "$DETAIL" ]; then
            NOTIFY_BODY="${SOURCE}\n${DETAIL}\n**状态**：${STATUS_TEXT}\n**地址**：[查看产品手册](${URL})"
          else
            NOTIFY_BODY="${SOURCE}\n**状态**：${STATUS_TEXT}\n**地址**：[查看产品手册](${URL})"
          fi

          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(cat <<DATA
          {
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": {"tag": "plain_text", "content": "📖 OfficeAI 产品手册已更新"},
                "template": "${TEMPLATE}"
              },
              "elements": [
                {"tag": "div", "text": {"tag": "lark_md", "content": "${NOTIFY_BODY}"}}
              ]
            }
          }
          DATA
          )"
