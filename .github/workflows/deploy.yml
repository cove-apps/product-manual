name: 构建并部署产品手册

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  COVE_WPS_PATH: ./cove-wps

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          path: product-manual

      - name: 检出 cove-wps（用于更新日志）
        uses: actions/checkout@v4
        with:
          repository: cove-apps/cove-wps
          path: cove-wps

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: product-manual/package-lock.json

      - name: 安装依赖
        run: cd product-manual && npm ci

      - name: 生成更新日志
        run: cd product-manual && node scripts/generate-changelog.js

      - name: 构建网站
        run: cd product-manual && npm run build

      - name: 导出 PDF
        run: |
          cd product-manual
          # 安装 Chrome 用于 PDF 生成
          npx puppeteer browsers install chrome
          node scripts/export-pdf.cjs

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: product-manual/.vitepress/dist

      - name: 上传 PDF 为构建产物
        uses: actions/upload-artifact@v4
        with:
          name: pdf-documents
          path: product-manual/public/downloads/*.pdf

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
